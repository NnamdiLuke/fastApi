services:
  fastapi-app:
    build: .
    ports:
      - '8000:80'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fastapi_db
    
  
  db:
    image: postgres:16
    restart: always
    container_name: fastapi_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: